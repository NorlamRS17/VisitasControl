version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vc_control_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vccontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vccontrol123}
      POSTGRES_DB: ${POSTGRES_DB:-vccontrol_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vccontrol}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vc_control_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@vccontrol.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
